function renderLogin(){
  return `
  <div style="min-height:100vh;background:linear-gradient(160deg,${C.navy} 0%,#1a4a8a 55%,${C.teal} 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,${C.gold},#f5c842);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto;margin-bottom:16px;">🗳️</div>
      <div style="color:${C.gold};font-size:23px;font-weight:800;letter-spacing:.5px;">TubigonCRM</div>
      <div style="color:rgba(255,255,255,0.65);font-size:13px;margin-top:4px;">Voter Management System</div>
      <div style="color:rgba(255,255,255,0.4);font-size:11px;margin-top:2px;">Tubigon Municipality · Bohol, Philippines</div>
    </div>
    ${S.loginError?`<div style="width:100%;max-width:340px;background:rgba(220,38,38,0.2);border:1px solid rgba(220,38,38,0.4);border-radius:10px;padding:10px 14px;color:#fca5a5;font-size:13px;margin-bottom:14px;text-align:center;">${S.loginError}</div>`:''}
    <div style="width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px;">
      <input id="inp-email" type="email" autocomplete="email" placeholder="Email address"
        style="padding:13px 16px;border-radius:12px;border:2px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.1);color:#fff;font-size:14px;outline:none;font-family:'Outfit',sans-serif;transition:all .2s;"
        onkeydown="if(event.key==='Enter')document.getElementById('inp-pass').focus()"/>
      <input id="inp-pass" type="password" autocomplete="current-password" placeholder="Password"
        style="padding:13px 16px;border-radius:12px;border:2px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.1);color:#fff;font-size:14px;outline:none;font-family:'Outfit',sans-serif;transition:all .2s;"
        onkeydown="if(event.key==='Enter')doLogin()"/>
      <button onclick="doLogin()" style="padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,${C.gold},#f5c842);color:${C.navy};font-weight:800;font-size:15px;cursor:pointer;transition:all .2s;margin-top:4px;" ${S.loginLoading?'disabled':''}>
        ${S.loginLoading?'<span class="spin"></span> Signing in...':'Sign In →'}
      </button>
      <div style="color:rgba(255,255,255,0.3);font-size:11px;text-align:center;">Contact your admin for login credentials.</div>
    </div>
  </div>`;
}
