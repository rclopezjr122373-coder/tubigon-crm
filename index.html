<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubigonCRM - Voter Management System</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-functions.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>TubigonCRM - Voter Management System</h1>
        </header>
        <main>
            <section id="auth">
                <h2>Authentication</h2>
                <form id="login-form">
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
            </section>
            <section id="dashboard">
                <h2>Dashboard Analytics</h2>
                <div id="analytics-data">
                    <!-- Dynamic data will be populated here -->
                </div>
            </section>
            <section id="voter-management">
                <h2>Voter Management</h2>
                <button id="export-csv">Export CSV</button>
                <div id="voter-list">
                    <!-- Voter list will be populated here -->
                </div>
            </section>
            <section id="barangay-tracking">
                <h2>Barangay Tracking</h2>
                <div id="barangay-data">
                    <!-- Barangay data will be populated here -->
                </div>
            </section>
            <section id="community-feed">
                <h2>Community Feed</h2>
                <div id="feed">
                    <!-- Community posts will be listed here -->
                </div>
            </section>
            <section id="admin-panel">
                <h2>Admin Panel</h2>
                <div id="admin-controls">
                    <!-- Admin controls will be available here -->
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>

</body>
