function calcAge(birthday){
  if(!birthday) return null;
  const b=new Date(birthday), n=new Date();
  let age=n.getFullYear()-b.getFullYear();
  if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate())) age--;
  return age;
}
function ageGroup(age){
  if(age===null||age===undefined) return 'Adult';
  return age<30?'Youth':age>=60?'Senior':'Adult';
}
function fmtBday(b){
  if(!b) return 'Not set';
  const d=new Date(b+'T00:00:00');
  return d.toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric'});
}
function timeAgo(d){
  if(!d) return 'just now';
  const s=Math.floor((new Date()-d)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

function buildQuery(){
  const brgy = coordBrgy();

  // If coordinator has no barangay assigned, return empty query
  if(isCoord() && !brgy){
    return db.collection('voters').limit(0);
  }

  const hasFilter = isCoord() ||
    S.filters.barangay || S.filters.gender || S.filters.ageGroup ||
    S.filters.occupation || S.filters.support;

  // Only use orderBy when no filters active — avoids composite index requirement
  let q = hasFilter
    ? db.collection('voters')
    : db.collection('voters').orderBy('lastName');

  if(isCoord()){
    // Coordinator locked to their barangay — exact match required
    q = q.where('barangay','==', brgy);
  } else {
    if(S.filters.barangay) q=q.where('barangay','==',S.filters.barangay);
  }
  if(S.filters.gender)     q=q.where('gender','==',S.filters.gender);
  if(S.filters.ageGroup)   q=q.where('ageGroup','==',S.filters.ageGroup);
  if(S.filters.occupation)    q=q.where('occupation','==',S.filters.occupation);
  if(S.filters.support)       q=q.where('support','==',S.filters.support);
  if(S.filters.voterCategory) q=q.where('voterCategory','==',S.filters.voterCategory);
  return q.limit(100);
}

function subscribeVoters(){
  const unsub=buildQuery().onSnapshot(snap=>{
    const voters=snap.docs.map(d=>({id:d.id,...d.data()}));
    // Sort client-side by lastName since orderBy is skipped when filtering

      S.error='Filter requires a Firestore index. Try fewer filters or contact admin.';
      render();
    }
  });
  S.unsubs.push(unsub);
}

async function addVoter(data){
  const bday=data.birthday||'';
  const age=bday?calcAge(bday):parseInt(data.manualAge||18);
  const ag=ageGroup(age);
  await db.collection('voters').add({
    firstName:data.firstName, lastName:data.lastName,
    gender:data.gender, barangay:data.barangay,
    occupation:data.occupation, contact:data.contact||'',
    birthday:bday, age, ageGroup:ag,
    notes:'', support:'Undecided', registered:true,
    createdAt:firebase.firestore.FieldValue.serverTimestamp(),
    createdBy:S.user.uid,
  });
  await db.collection('config').doc('stats').set({
    total:                                   firebase.firestore.FieldValue.increment(1),
    [`g_${data.gender.toLowerCase()}`]:      firebase.firestore.FieldValue.increment(1),
    [`a_${ag.toLowerCase()}`]:               firebase.firestore.FieldValue.increment(1),
    [`o_${data.occupation}`]:                firebase.firestore.FieldValue.increment(1),
    [`b_${data.barangay}_count`]:            firebase.firestore.FieldValue.increment(1),
    support_undecided:                       firebase.firestore.FieldValue.increment(1),
  },{merge:true});
}

async function updateSupport(id,newSupport){
  const old=S.voters.find(v=>v.id===id);
  if(!old||old.support===newSupport) return;
  // Coordinator can only update voters in their barangay
  if(isCoord()&&old.barangay!==coordBrgy()) return;
  await db.collection('voters').doc(id).update({support:newSupport});
  await db.collection('config').doc('stats').set({
    [`support_${old.support.toLowerCase()}`]: firebase.firestore.FieldValue.increment(-1),
    [`support_${newSupport.toLowerCase()}`]:  firebase.firestore.FieldValue.increment(1),
  },{merge:true});
  if(S.modal?.data?.id===id) S.modal.data={...S.modal.data,support:newSupport};
  render();
}

async function castVote(fid,idx){
  const uid=S.user.uid;
  const item=S.feed.find(f=>f.id===fid);
  if(!item?.options) return;
  if((item.pollVoters||[]).includes(uid)) return;
  const votes=[...(Array.isArray(item.votes)?item.votes:new Array(item.options.length).fill(0))];
  while(votes.length<item.options.length) votes.push(0);
  votes[idx]=(votes[idx]||0)+1;
  await db.collection('feed').doc(fid).update({votes,pollVoters:firebase.firestore.FieldValue.arrayUnion(uid)});
}

async function resetAllSupport(){
  if(!confirm('Reset ALL voters to Undecided?\n\nThis cannot be undone. The COMELEC categories (*, C, B) will be cleared.\n\nPress OK to confirm.')) return;
  set({success:'',error:''});

  try {
    // Get all voters in batches of 100
    let lastDoc = null;
    let total = 0;
    let batchCount = 0;

    while(true){
      let q = db.collection('voters').limit(100);
      if(lastDoc) q = q.startAfter(lastDoc);
      const snap = await q.get();
      if(snap.empty) break;

      const batch = db.batch();
      snap.docs.forEach(d=>{
        batch.update(d.ref, {support:'Undecided'});
      });
      await batch.commit();

      total += snap.docs.length;
      lastDoc = snap.docs[snap.docs.length-1];
      batchCount++;

      // Update stats
      set({success:`Resetting... ${total.toLocaleString()} voters updated`});

      if(snap.docs.length < 100) break;
      await new Promise(r=>setTimeout(r,150));
    }

    // Reset support stats
    await db.collection('config').doc('stats').update({
      support_strong:    0,
      support_leaning:   0,
      support_undecided: total,
      support_opposition:0,
    });

    set({success:`✓ Done — ${total.toLocaleString()} voters reset to Undecided`});
  } catch(e){
    set({error:'Reset failed: '+e.message});
  }
}

      const v=d.data();

  const snap=await q.get();
  const counts={};
  snap.docs.forEach(d=>{const s=d.data().support||'Undecided';counts[s]=(counts[s]||0)+1;});
  dlCSV([['Support','Count'],...Object.entries(counts)],'TubigonSupport');
}
async function exportBarangayCSV(){
  if(isCoord()){ set({error:'Coordinators can only export their own barangay.'}); return; }
  const snap=await db.collection('voters').get();
  const counts={};
  snap.docs.forEach(d=>{const b=d.data().barangay||'Unknown';counts[b]=(counts[b]||0)+1;});
  dlCSV([['Barangay','Count'],...Object.entries(counts).sort((a,b)=>b[1]-a[1])],'TubigonBarangay');
}
function dlCSV(rows,name){
  const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=Object.assign(document.createElement('a'),{
    href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),
    download:`${name}_${new Date().toISOString().slice(0,10)}.csv`
  });
  a.click(); set({success:'Download started ✓'});
}

/* ════════════════════════════════════════════════════
   RENDER — FEED TAB
   ════════════════════════════════════════════════════ */
function renderFeed(){
  const TC={announcement:C.danger,event:C.info,poll:'#8b5cf6',update:C.success};
  const TI={announcement:'📢',event:'📅',poll:'📊',update:'✅'};
  return `
  <div class="tab-content">
    ${canWrite()?`
    <div class="card" style="margin-bottom:12px;">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px;">
        <div style="width:36px;height:36px;border-radius:10px;background:${C.navy}18;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">${isAdmin()?'🛡️':'📋'}</div>
        <input id="post-inp" placeholder="Write an announcement or update..."
          style="flex:1;padding:10px 13px;border-radius:10px;border:1px solid ${C.border};font-size:13px;outline:none;font-family:'Outfit',sans-serif;"/>
      </div>
      <div style="display:flex;gap:7px;flex-wrap:wrap;">
        ${['announcement','event','update'].map(t=>`<button onclick="doPost('${t}')" style="padding:6px 12px;border-radius:20px;border:1px solid ${TC[t]};background:${TC[t]}15;font-size:11px;cursor:pointer;color:${TC[t]};font-family:'Outfit',sans-serif;font-weight:600;">${TI[t]} ${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
      </div>
    </div>`:''}

    ${S.feed.length===0?`
    <div style="text-align:center;padding:50px 20px;color:${C.muted};">
      <div style="font-size:44px;margin-bottom:14px;">📢</div>
      <div style="font-size:15px;font-weight:600;color:${C.text};">No posts yet</div>
    </div>`:''}

    ${S.feed.map(item=>{
      const tclr=TC[item.type]||C.navy;
      const uid=S.user?.uid;
      const liked=Array.isArray(item.likes)&&item.likes.includes(uid);
      const lcount=Array.isArray(item.likes)?item.likes.length:(item.likes||0);
      const hasVoted=Array.isArray(item.pollVoters)&&item.pollVoters.includes(uid);
      const votes=Array.isArray(item.votes)?item.votes:[];
      const vTotal=votes.reduce((a,b)=>a+b,0)||1;
      const tstr=item.createdAt?.toDate?timeAgo(item.createdAt.toDate()):'just now';
      return `
      <div class="card">
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;">
          <div style="width:38px;height:38px;border-radius:10px;background:${tclr}18;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">${TI[item.type]||'📌'}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:13px;color:${C.text};">${item.author}</div>
            <div style="font-size:11px;color:${C.muted};">${item.barangay} · ${tstr}</div>
          </div>
          <span class="badge" style="background:${tclr}22;color:${tclr};">${item.type}</span>
        </div>
        <div style="font-size:13px;color:${C.text};line-height:1.55;margin-bottom:${item.options?'10px':'0'};">${item.content}</div>
        ${item.options?`
        <div style="margin-top:4px;">
          ${item.options.map((opt,idx)=>{
            const v=votes[idx]||0;
            const pct=Math.round(v/vTotal*100);
            return `
            <button onclick="castVote('${item.id}',${idx})" ${hasVoted?'disabled':''} style="display:block;width:100%;text-align:left;padding:10px 13px;border-radius:10px;margin-bottom:6px;border:2px solid ${C.border};background:transparent;color:${C.text};font-size:13px;cursor:${hasVoted?'default':'pointer'};font-family:'Outfit',sans-serif;position:relative;overflow:hidden;">
              ${hasVoted?`<div style="position:absolute;left:0;top:0;height:100%;width:${pct}%;background:${tclr}12;z-index:0;border-radius:9px;"></div>`:''}
              <span style="position:relative;z-index:1;">${opt}</span>
              ${hasVoted?`<span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;color:${C.muted};font-weight:700;z-index:1;">${pct}%</span>`:''}
            </button>`;
          }).join('')}
          ${hasVoted?`<div style="font-size:11px;color:${C.muted};text-align:center;margin-top:4px;">${vTotal} votes total</div>`:''}
        </div>`:''}
        <div style="display:flex;gap:16px;padding-top:10px;margin-top:10px;border-top:1px solid ${C.border};">
          <button class="feed-btn" onclick="toggleLike('${item.id}')" style="color:${liked?'#e11d48':C.muted};">${liked?'❤️':'🤍'} ${lcount}</button>
          <button class="feed-btn">💬 ${item.comments||0}</button>
          <button class="feed-btn">🔗 Share</button>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

async function doPost(type){
  const inp=document.getElementById('post-inp');
  if(!inp?.value.trim()) return;
  await postFeed(inp.value,type);
  inp.value='';
}

  return `

async function saveNewVoter(){
  const fn=document.getElementById('nv-fn')?.value.trim();
  const ln=document.getElementById('nv-ln')?.value.trim();
  const bday=document.getElementById('nv-bday')?.value;
  const gen=document.getElementById('nv-gen')?.value;
  const brgy=isCoord()?coordBrgy():document.getElementById('nv-brgy')?.value;
  const occ=document.getElementById('nv-occ')?.value;
  const con=document.getElementById('nv-con')?.value.trim();
  if(!fn||!ln){ S.error='First name and last name are required.'; render(); return; }
  if(!bday){ S.error='Birthday is required to calculate age and age group.'; render(); return; }
  const age=calcAge(bday);
  if(age<18){ S.error='Voter must be at least 18 years old.'; render(); return; }
  try{
    const mn=document.getElementById('nv-mn')?.value.trim(); await addVoter({firstName:fn,middleName:mn||'',lastName:ln,birthday:bday,gender:gen,barangay:brgy,occupation:occ,contact:con});
    S.modal=null; S.error=''; render();
  }catch(e){ S.error='Failed to save: '+e.message; render(); }
}

async function saveNewUser(){
  const name=document.getElementById('nu-name')?.value.trim();
  const email=document.getElementById('nu-email')?.value.trim();
  const uid=document.getElementById('nu-uid')?.value.trim();
  const role=document.getElementById('nu-role')?.value;
  const brgy=document.getElementById('nu-brgy')?.value;
  if(!name||!email||!uid){ S.error='Name, email, and Firebase UID are required.'; render(); return; }
  try{
    await db.collection('users').doc(uid).set({name,email,role,barangay:brgy,active:true});
    S.modal=null; S.error=''; render();
  }catch(e){ S.error='Failed: '+e.message; render(); }
}

/* ════════════════════════════════════════════════════
   FIREBASE AUTH STATE LISTENER
   ════════════════════════════════════════════════════ */
auth.onAuthStateChanged(async user=>{
  if(user){
    try{
      let snap=await db.collection('users').doc(user.uid).get();
      if(!snap.exists){
        const all=await db.collection('users').limit(1).get();
        if(all.empty){
          await db.collection('users').doc(user.uid).set({
            name:'Administrator',email:user.email,role:'admin',barangay:'',active:true
          });
          snap=await db.collection('users').doc(user.uid).get();
        } else {
          await auth.signOut();
          set({loginLoading:false,loginError:'Account not found. Contact your admin.',screen:'login'});
          return;
        }
      }
      const profile=snap.data();
      if(profile.active===false){
        await auth.signOut();
        set({loginLoading:false,loginError:'Your account has been deactivated.',screen:'login'});
        return;
      }
      S.user=user; S.profile=profile; S.screen='main'; S.loginLoading=false;
      subscribeVoters();
      subscribeFeed();
      subscribeStats();
      subscribeUsers();
      render();
    }catch(e){
      await auth.signOut();
      set({loginLoading:false,loginError:'Error: '+e.message,screen:'login'});
    }
  } else {
    set({screen:'login',loginLoading:false});
  }
});

  if(!confirm(currentlyActive?'Deactivate this user? They will be blocked from logging in.':'Activate this user?')) return;
  try{
    await db.collection('users').doc(uid).update({active:!currentlyActive});
  }catch(e){ alert('Failed: '+e.message); }
}

async function deleteUser(uid, name){
  if(!confirm('Delete user "'+name+'"? This cannot be undone.\nNote: This only removes them from the CRM — you must also delete them in Firebase Authentication separately.')) return;
  try{
    await db.collection('users').doc(uid).delete();
  }catch(e){ alert('Failed: '+e.message); }
}

render();

/* ════════════════════════════════════════════════════
   INDEXEDDB — OFFLINE VOTER CACHE
   ════════════════════════════════════════════════════ */
const IDB_NAME    = 'tubigon-offline';
const IDB_VERSION = 2;
let idb = null;

function openIDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains('voters'))
        db.createObjectStore('voters', {keyPath:'id'});
      if(!db.objectStoreNames.contains('pendingWrites'))
        db.createObjectStore('pendingWrites', {keyPath:'id', autoIncrement:true});
    };
    req.onsuccess = e=>{ idb=e.target.result; resolve(idb); };
    req.onerror   = e=>reject(e.target.error);
  });
}

async function cacheVotersOffline(voters){
  if(!idb) await openIDB();
  const tx = idb.transaction('voters','readwrite');
  const store = tx.objectStore('voters');
  for(const v of voters) store.put(v);
  return new Promise((res,rej)=>{ tx.oncomplete=res; tx.onerror=rej; });
}

async function getOfflineVoters(barangay){
  if(!idb) await openIDB();
  return new Promise((resolve,reject)=>{
    const tx    = idb.transaction('voters','readonly');
    const store = tx.objectStore('voters');
    const req   = store.getAll();
    req.onsuccess = ()=>{
      let voters = req.result||[];
      if(barangay) voters = voters.filter(v=>v.barangay===barangay);
      voters.sort((a,b)=>(a.lastName||'').localeCompare(b.lastName||''));
      resolve(voters);
    };
    req.onerror = ()=>reject(req.error);
  });
}

async function queuePendingWrite(action, docId, data){
  if(!idb) await openIDB();
  const tx    = idb.transaction('pendingWrites','readwrite');
  const store = tx.objectStore('pendingWrites');
  store.add({action, docId, data, timestamp: Date.now()});
}

async function syncPendingWrites(){
  if(!idb) await openIDB();
  const tx     = idb.transaction('pendingWrites','readwrite');
  const store  = tx.objectStore('pendingWrites');
  const allReq = store.getAll();
  allReq.onsuccess = async ()=>{
    const pending = allReq.result||[];
    if(pending.length===0) return;
    console.log(`Syncing ${pending.length} pending writes...`);
    for(const item of pending){
      try{
        if(item.action==='update'){
          await db.collection('voters').doc(item.docId).update(item.data);
        } else if(item.action==='add'){
          await db.collection('voters').add(item.data);
        }
        // Delete from pending
        const tx2 = idb.transaction('pendingWrites','readwrite');
        tx2.objectStore('pendingWrites').delete(item.id);
      } catch(e){
        console.warn('Pending write failed:', e.message);
      }
    }
    console.log('Sync complete');
  };
}

/* ════════════════════════════════════════════════════
   OFFLINE DETECTION + SYNC
   ════════════════════════════════════════════════════ */
window.addEventListener('online', async ()=>{
  isOnline = true;
  console.log('Back online — syncing pending writes...');
  await syncPendingWrites();
  // Refresh voters from Firestore
  S.unsubs.forEach(u=>u()); S.unsubs=[];
  subscribeVoters(); subscribeFeed(); subscribeStats(); subscribeUsers();
  set({success:'Back online ✓ Data synced'});
  setTimeout(()=>set({success:''}), 3000);
});

window.addEventListener('offline', ()=>{
  isOnline = false;
  set({success:'', error:''});
  // Load from IndexedDB
  const brgy = isCoord()?coordBrgy():S.filters.barangay||null;
  getOfflineVoters(brgy).then(voters=>{
    S.voters = voters;
    render();
  });
});

/* ════════════════════════════════════════════════════
   OVERRIDE updateSupport FOR OFFLINE
   ════════════════════════════════════════════════════ */
const _updateSupport = updateSupport;
async function updateSupport(id, newSupport){
  if(!isOnline){
    // Update locally
    const v = S.voters.find(x=>x.id===id);
    if(v){
      const old = v.support;
      v.support = newSupport;
      // Update in IndexedDB
      if(idb){
        const tx = idb.transaction('voters','readwrite');
        tx.objectStore('voters').put({...v});
      }
      // Queue for sync
      await queuePendingWrite('update', id, {support:newSupport});
      if(S.modal?.data?.id===id) S.modal.data={...S.modal.data,support:newSupport};
      set({success:'Saved offline — will sync when online ✓'});
      setTimeout(()=>set({success:''}),3000);
    }
    return;
  }
  return _updateSupport(id, newSupport);
}

/* ════════════════════════════════════════════════════
   OVERRIDE saveNotes FOR OFFLINE
   ════════════════════════════════════════════════════ */
const _saveNotes = saveNotes;
async function saveNotes(id, notes){
  if(!isOnline){
    const v = S.voters.find(x=>x.id===id);
    if(v){
      v.notes = notes;
      if(idb){
        const tx = idb.transaction('voters','readwrite');
        tx.objectStore('voters').put({...v});
      }
      await queuePendingWrite('update', id, {notes});
      if(S.modal?.data?.id===id) S.modal.data={...S.modal.data,notes};
      set({success:'Notes saved offline — will sync when online ✓'});
      setTimeout(()=>set({success:''}),3000);
    }
    return;
  }
  return _saveNotes(id, notes);
}

/* ════════════════════════════════════════════════════
   CACHE VOTERS FOR OFFLINE ON LOAD
   ════════════════════════════════════════════════════ */
function cacheLoadedVotersForOffline(voters){
  if(voters.length>0){
    openIDB().then(()=>cacheVotersOffline(voters)).catch(e=>console.warn('IDB cache failed:',e));
  }
}



/* ════════════════════════════════════════════════════
   SERVICE WORKER REGISTRATION
   ════════════════════════════════════════════════════ */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(reg=>{
        console.log('SW registered:', reg.scope);
        // Listen for sync messages from SW
        navigator.serviceWorker.addEventListener('message', e=>{
          if(e.data.type==='SYNC_PENDING') syncPendingWrites();
        });
        // Check for updates
        reg.addEventListener('updatefound', ()=>{
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', ()=>{
            if(newWorker.state==='installed' && navigator.serviceWorker.controller){
              console.log('New SW available');
            }
          });
        });
      })
      .catch(err=>console.warn('SW registration failed:', err));
  });
}
