<script>

/* =========================
   SUPPORT SCORE MODEL
   ========================= */
const SUPPORT_SCORE = {
  "Strong": 1,
  "Leaning": 0.5,
  "Undecided": 0,
  "Opposition": -1
};

/* =========================
   CSV PARSER
   ========================= */
function parseCSV(text){
  const rows = text.split('\n').map(r => r.split(','));
  const headers = rows.shift();

  return rows.map(r=>{
    let obj = {};
    headers.forEach((h,i)=>obj[h.trim()] = r[i]?.trim());
    return obj;
  });
}

/* =========================
   VOTER ID GENERATOR
   ========================= */
function generateVoterID(row){
  return (
    (row["Last Name"] || "") + "_" +
    (row["First Name"] || "") + "_" +
    (row["Barangay"] || "")
  ).replace(/\s+/g,'').toUpperCase();
}

/* =========================
   CSV SYNC ENGINE
   ========================= */
async function syncCSV(data){
  const chunkSize = 400;

  for(let i=0;i<data.length;i+=chunkSize){
    const batch = db.batch();
    const chunk = data.slice(i,i+chunkSize);

    chunk.forEach(row=>{
      const id = row["VoterID"] || generateVoterID(row);
      const ref = db.collection('voters').doc(id);

      const age = row["Birthday"] ? calcAge(row["Birthday"]) : 30;
      const support = row["Support"] || "Undecided";

      batch.set(ref,{
        firstName: row["First Name"],
        lastName: row["Last Name"],
        gender: row["Gender"],
        barangay: row["Barangay"],
        occupation: row["Occupation"],
        contact: row["Contact"] || "",
        birthday: row["Birthday"] || "",
        age,
        ageGroup: ageGroup(age),
        notes: row["Notes"] || "",
        support: support,
        voting: {
          preference: support,
          score: SUPPORT_SCORE[support],
          lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        },
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    });

    await batch.commit();
  }
}

/* =========================
   CSV UPLOAD HANDLER
   ========================= */
async function handleCSVUpload(e){
  const file = e.target.files[0];
  if(!file) return;

  const text = await file.text();
  const data = parseCSV(text);

  await syncCSV(data);
  await rebuildStats();

  set({success:'CSV synced ✓'});
}

/* =========================
   UPDATE SUPPORT (AUDITABLE)
   ========================= */
async function updateSupport(id, newSupport){
  const v = S.voters.find(x => x.id === id);
  if(!v) return;

  const ref = db.collection('voters').doc(id);

  const prev = v.voting?.preference || v.support || "Undecided";

  await ref.set({
    support: newSupport,
    voting: {
      preference: newSupport,
      score: SUPPORT_SCORE[newSupport],
      lastUpdated: firebase.firestore.FieldValue.serverTimestamp(),
      history: firebase.firestore.FieldValue.arrayUnion({
        value: prev,
        date: new Date(),
        by: S.user.uid
      })
    }
  }, { merge: true });
}

/* =========================
   REBUILD STATS
   ========================= */
async function rebuildStats(){
  const snap = await db.collection('voters').get();

  let stats = { total: snap.size };

  snap.forEach(doc=>{
    const v = doc.data();
    const s = v.support?.toLowerCase();
    if(s) stats["support_"+s] = (stats["support_"+s]||0)+1;

    const b = v.barangay;
    if(b) stats[`b_${b}_count`] = (stats[`b_${b}_count`]||0)+1;
  });

  await db.collection('config').doc('stats').set(stats);
}

/* =========================
   WIN PROBABILITY MODEL
   ========================= */
function computeBarangayWinProb(barangay){
  const voters = S.voters.filter(v=>v.barangay===barangay);
  if(voters.length===0) return 0;

  let totalScore = 0;
  voters.forEach(v=>{
    totalScore += v.voting?.score ?? SUPPORT_SCORE[v.support] ?? 0;
  });

  // normalize to 0–100%
  const maxScore = voters.length * 1;
  const minScore = voters.length * -1;

  const normalized = (totalScore - minScore) / (maxScore - minScore);

  return Math.round(normalized * 100);
}
